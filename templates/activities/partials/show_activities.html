<div class="activity-wrapper">

    <div class="page-header">

        <div>
            <h2>Activity Records</h2>
            <p>View, search and manage faculty activities.</p>
        </div>

        <div class="banner-dashboard">
            📊
        </div>

    </div>

    <div class="search-card">

        <div class="field">

            <label>Select Month</label>

            <input
                type="month"
                id="month">

        </div>

        <div class="field">

            <label>From Date</label>

            <input
                type="date"
                id="from_date">

        </div>

        <div class="field">

            <label>To Date</label>

            <input
                type="date"
                id="to_date">

        </div>

        <div class="search-btn">

            <button
                id="searchButton"
                class="primaryButton">

                🔍 Search

            </button>

        </div>

    </div>


    <div class="table-card">

        <table id="activityTable">

            <thead>

            <tr>

                <th>Faculty</th>

                <th>Activity</th>

                <th>Date</th>

                <th>Submitted On</th>

                <th>Attachments</th>

                <th>Description</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>
